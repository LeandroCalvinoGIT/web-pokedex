<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="descrption" content="Pokédex" />
    <meta name="keywords" content="Pokedex, Pokemon" />
    <meta name="author" content="LeandroCalvino" />
    <title>Pokédex</title>
    <link rel="icon" href="./assets/pixelart-pokeball.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>POKÉDEX</h1>
      <nav>
        <input type="text" name="" id="" />
      </nav>
    </header>
    <main>
      <section class="card-container">
        <!-- Pokemon card modelo -->
        <div class="pokemon-card">
          <a href="./html/">
            <h3>N°0000 | pokemon</h3>
            <img src="./assets/pixelart-pokeball.png" alt="pokeball" />
            <p>Tipo: <span class="unkown-type"> ??? </span></p>
          </a>
        </div>

        <!-- SQUIRTLE -->
        <div class="pokemon-card">
          <a href="./html/">
            <h3>N°0007 | Squirtle</h3>
            <img src="./assets/squirtle.png" alt="squirtle" />
            <p>Tipo: <span class="water-type"> AGUA </span></p>
          </a>
        </div>

        <!-- PIKACHU -->
        <div class="pokemon-card">
          <a href="./html/">
            <h3>N°0025 | Pikachu</h3>
            <img src="./assets/pikachu.png" alt="pikachu" />
            <p>Tipo: <span class="electric-type">ELÉCTRICO</span></p>
          </a>
        </div>

        <!-- GENGAR -->
        <div class="pokemon-card">
          <a href="./html/">
            <h3>N°0000 | Gengar</h3>
            <img src="./assets/gengar.png" alt="gengar" />
            <p>Tipo: <span class="unkown-type"> FANTASMA </span></p>
          </a>
        </div>

        <!-- WOOPER -->
        <div class="pokemon-card">
          <a href="./html/">
            <h3>N°0194 | Wooper</h3>
            <img src="./assets/wooper.png" alt="wooper" />
            <p>
              Tipo: <span class="water-type">AGUA</span>
              <span class="ground-type">TIERRA</span>
            </p>
          </a>
        </div>

        <!-- MUDKIP -->
        <div class="pokemon-card">
          <a href="./html/mudkip.html">
            <h3>N°0258 | Mudkip</h3>
            <img src="./assets/mudkip.png" alt="mudkip" />
            <p>
              Tipo: <span class="water-type">AGUA</span>
              <span class="ground-type">TIERRA</span>
            </p>
          </a>
        </div>
      </section>
    </main>
    <footer>
      <a href="https://github.com/LeandroCalvinoGIT">
        <img src="./assets/logo/github-logo.png" alt="github logo" />
      </a>
    </footer>
  </body>
</html>
